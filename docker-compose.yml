services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: bingasys
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - bingasys-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bingasys"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bingasys-postgres:
